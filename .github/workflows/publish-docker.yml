# GHCR 容器镜像发布:与 publish-server.yml 同 tag 触发(版本单一真源 = server package.json)。
# 用户可直接 `docker run ghcr.io/tokenrollai/tool-bridge`。
# 一次性前置:首发后在 GitHub Packages 设置里把镜像可见性设为 public。

name: publish-docker

on:
  push:
    tags:
      - 'server-v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write # 推 GHCR(GITHUB_TOKEN)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # tag 版本与 package.json 一致性校验(与 publish-server.yml 同规则)
      - name: Check tag matches package version
        if: github.ref_type == 'tag'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#server-v}"
          PKG_VERSION="$(node -p "require('./packages/server/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "tag server-v$TAG_VERSION != package.json $PKG_VERSION" >&2
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=match,pattern=server-v(.*),group=1
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
