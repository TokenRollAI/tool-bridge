# GHCR 发布 tb-agent 边车镜像:与 publish-cli.yml 同 tag 触发(版本单一真源 = CLI package.json)。
# 用户直接 `docker run ghcr.io/tokenrollai/tool-bridge/tb-agent connect ...`,或作 k8s sidecar。
# 一次性前置:首发后在 GitHub Packages 设置里把该镜像可见性设为 public。

name: publish-agent

on:
  push:
    tags:
      - 'cli-v*' # 打 tag 即发布:git tag cli-v0.7.0 && git push origin cli-v0.7.0
  workflow_dispatch:

permissions:
  contents: read
  packages: write # 推 GHCR(GITHUB_TOKEN)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # tag 版本与 package.json 一致性校验(与 publish-cli.yml 同规则)
      - name: Check tag matches package version
        if: github.ref_type == 'tag'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          PKG_VERSION="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "tag cli-v$TAG_VERSION != package.json $PKG_VERSION" >&2
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/tb-agent
          tags: |
            type=match,pattern=cli-v(.*),group=1
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/cli/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
